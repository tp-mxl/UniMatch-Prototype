<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - UniMatch</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background-color: #f8fafc; color: #0f172a;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 72px;
            padding: 0 40px;
            background: #0f172a; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }
        .logo {font-size: 24px; font-weight: 700; color: #ffffff; letter-spacing: -0.5px; text-decoration: none;}        
        .logo span { color: #8b5cf6; }
        .auth-container { display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 72px); padding: 40px 20px; box-sizing: border-box; }
        .auth-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .auth-card h2 { margin-top: 0; font-size: 28px; margin-bottom: 8px; }
        .subtitle { color: #475569; margin-bottom: 32px; font-size: 15px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; color: #334155; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .form-group input:focus { outline: none; border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15); }
        .btn-full { width: 100%; padding: 14px; background: #7c3aed; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-full:hover { background: #6d28d9; }
        .auth-footer { margin-top: 24px; font-size: 14px; }
        .auth-footer a { color: #7c3aed; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">Uni<span>Match</span></a>
    </nav>
    
    <div class="auth-container">
        <div class="auth-card">
            <h2>Reset Password</h2>
            <p class="subtitle">Enter your email and we'll send you a link to reset your password.</p>
            <form action="login.html">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@university.edu" required>
                </div>
                <button type="submit" class="btn-full">Send Reset Link</button>
            </form>
            <div class="auth-footer">
                Remembered your password? <a href="login.html">Log in</a>
            </div>
        </div>
    </div>
</body>
</html>
