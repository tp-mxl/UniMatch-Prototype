<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniMatch - Find Your Perfect Internship</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Inter, Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc; /* Matches the dashboard background */
            color: #0f172a;
        }
        
        /* Styled to match the dark sidebar from the dashboards */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 72px; /* Forces all navbars to be exactly this tall */
            padding: 0 40px; /* Removes top/bottom padding so flexbox centers it vertically */
            background: #0f172a; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            box-sizing: border-box; /* Ensures padding doesn't add to the height */
        }
        
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }
        
        .logo span { 
            color: #8b5cf6; /* Matches the purple UniMatch logo text from Employer Menu */
        }
        
        .nav-links {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #cbd5e1;
            font-weight: 500;
            margin-left: 32px;
            font-size: 15px;
            transition: color 0.2s;
        }
        
        .nav-links a:hover { 
            color: #ffffff; 
        }
        
        .nav-btn {
            background: #7c3aed; /* The vibrant purple from your dashboard buttons */
            color: white !important;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600 !important;
            transition: background 0.2s;
        }
        
        .nav-btn:hover { 
            background: #6d28d9; 
        }

        .hero {
            text-align: center;
            padding: 120px 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .hero h1 {
            font-size: 52px;
            margin-bottom: 24px;
            color: #0f172a;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }
        
        .hero p {
            font-size: 18px;
            color: #475569;
            margin-bottom: 48px;
            line-height: 1.6;
        }
        
        .cta-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        
        .btn-primary {
            background: #7c3aed; 
            color: white;
            padding: 14px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(124, 58, 237, 0.2);
        }
        
        .btn-primary:hover { 
            background: #6d28d9; 
            transform: translateY(-1px);
        }
        
        .btn-outline {
            background: white;
            color: #0f172a;
            padding: 14px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            border: 1px solid #cbd5e1;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }
        
        .btn-outline:hover { 
            border-color: #94a3b8;
            background: #f1f5f9;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Uni<span>Match</span></div>
        <div class="nav-links">
            <a href="login.html">Log In</a>
            <a href="register.html" class="nav-btn">Sign Up</a>
        </div>
    </nav>

    <div class="hero">
        <h1>Bridge the gap between campus and career.</h1>
        <p>UniMatch connects ambitious students with forward-thinking companies. Discover internships that align with your skills, or find the perfect candidate to grow your team.</p>
        <div class="cta-buttons">
            <a href="register.html" class="btn-primary" style="padding: 16px 48px; font-size: 18px;">Register Now!</a>
        </div>
    </div>
</body>
</html>
